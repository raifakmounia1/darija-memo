<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mémo Darija</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#f5f0e8;--warm:#fff8f0;--ink:#1c1c1e;--muted:#6b6b6b;
  --a1:#2d7d46;--a1l:#e8f5ed;--a1b:#1a5c31;
  --a2:#c47c1a;--a2l:#fef3e2;--a2b:#8f5a10;
  --b1:#5046a0;--b1l:#eeedfb;--b1b:#352f7a;
  --ok:#2d7d46;--okl:#e8f5ed;--err:#c0392b;--errl:#fdecea;
  --card:#ffffff;--border:#e8e2d8;--radius:14px;--radiusS:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh}
.screen{display:none}.screen.active{display:block}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-box{background:var(--card);border-radius:24px;padding:2.5rem 2rem;max-width:420px;width:100%;box-shadow:0 4px 32px rgba(0,0,0,0.08)}
.login-logo{font-size:36px;margin-bottom:.5rem;text-align:center}
.login-box h1{font-size:24px;font-weight:800;text-align:center;margin-bottom:4px}
.login-box .sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:2rem}
.lvl-btn{width:100%;padding:14px 16px;margin-bottom:12px;background:var(--sand);border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;transition:all .2s;font-family:'Nunito',sans-serif}
.lvl-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.lvl-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.lvl-name{font-size:15px;font-weight:700}
.lvl-desc{font-size:12px;color:var(--muted);margin-top:2px}

/* APP SHELL */
#appScreen{min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:.75rem 1.25rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:16px;font-weight:800;flex:1}
.level-pill{font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px}
.back-btn{font-size:13px;padding:6px 14px;background:var(--sand);border:1px solid var(--border);border-radius:var(--radiusS);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;color:var(--muted)}

/* TABS */
.tab-scroll{overflow-x:auto;white-space:nowrap;padding:.75rem 1rem .5rem;background:var(--warm);border-bottom:1px solid var(--border);scrollbar-width:none}
.tab-scroll::-webkit-scrollbar{display:none}
.tab{display:inline-block;padding:7px 16px;font-size:13px;font-weight:700;background:transparent;border:2px solid var(--border);border-radius:999px;cursor:pointer;margin-right:8px;color:var(--muted);transition:all .15s;font-family:'Nunito',sans-serif;white-space:nowrap}
.tab.active{color:#fff;border-color:transparent}
.content{padding:1rem;max-width:820px;margin:0 auto}
.panel{display:none}.panel.active{display:block}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:14px}
.card-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title .icon{font-size:18px}
.note{background:var(--sand);border-left:3px solid var(--border);padding:10px 14px;border-radius:0 var(--radiusS) var(--radiusS) 0;margin-top:10px;font-size:13px;color:var(--muted);line-height:1.6}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:0 8px 10px 0;border-bottom:2px solid var(--border)}
td{padding:8px 8px 8px 0;border-bottom:1px solid var(--sand);color:var(--ink);vertical-align:top;line-height:1.4}
tr:last-child td{border-bottom:none}
.verb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:480px){.verb-grid{grid-template-columns:repeat(2,1fr)}}
.verb-cell{background:var(--sand);border-radius:var(--radiusS);padding:10px 10px 8px}
.vp{font-size:11px;color:var(--muted);margin-bottom:2px;font-weight:600}
.vf{font-size:15px;font-weight:800}
.vt{font-size:12px;color:var(--muted);margin-top:3px}

/* SECTION HEADER */
.section-head{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:1.25rem 0 8px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;font-size:13px;font-weight:700;border-radius:var(--radiusS);cursor:pointer;border:2px solid var(--border);background:var(--card);color:var(--ink);font-family:'Nunito',sans-serif;transition:all .15s}
.btn:hover{background:var(--sand);transform:translateY(-1px)}
.btn-primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn-primary:hover{background:#333;border-color:#333}
.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem}

/* FEEDBACK */
.fb{font-size:13px;padding:10px 14px;border-radius:var(--radiusS);margin-top:10px;font-weight:600;line-height:1.5}
.fb.ok{background:var(--okl);color:var(--ok)}
.fb.err{background:var(--errl);color:var(--err)}

/* ─── EXERCISE TYPES ─── */

/* 1. Fill-in-the-blank */
.blank{display:inline-block;min-width:90px;border:none;border-bottom:2.5px solid var(--border);background:transparent;font-size:14px;font-weight:700;font-family:'Nunito',sans-serif;color:var(--ink);padding:2px 4px;outline:none;transition:border-color .2s}
.blank:focus{border-color:var(--ink)}
.blank.ok{border-color:var(--ok);color:var(--ok)}
.blank.err{border-color:var(--err);color:var(--err)}
.exo-line{font-size:14px;color:var(--ink);line-height:2.6;margin-bottom:4px}
.hint-tag{font-size:12px;color:var(--muted);font-style:italic;margin-left:4px}

/* 2. Select dropdown */
.sel{font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;border:2px solid var(--border);border-radius:var(--radiusS);padding:4px 8px;background:var(--card);color:var(--ink);cursor:pointer;outline:none}
.sel.ok{border-color:var(--ok);background:var(--okl);color:var(--ok)}
.sel.err{border-color:var(--err);background:var(--errl);color:var(--err)}

/* 3. Word order drag */
.word-bank{display:flex;flex-wrap:wrap;gap:8px;min-height:48px;padding:10px;background:var(--sand);border-radius:var(--radiusS);margin-bottom:10px}
.word-slot{display:flex;flex-wrap:wrap;gap:8px;min-height:48px;padding:10px;background:var(--warm);border:2px dashed var(--border);border-radius:var(--radiusS);margin-bottom:10px}
.word-chip{padding:6px 14px;background:var(--card);border:2px solid var(--border);border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;user-select:none}
.word-chip:hover{background:var(--sand);transform:scale(1.04)}
.word-chip.placed{background:var(--ink);color:#fff;border-color:var(--ink)}
.word-chip.correct-chip{background:var(--okl);color:var(--ok);border-color:var(--ok)}
.word-chip.wrong-chip{background:var(--errl);color:var(--err);border-color:var(--err)}

/* 4. Matching */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-item{padding:10px 14px;background:var(--sand);border:2px solid var(--border);border-radius:var(--radiusS);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.match-item:hover{border-color:#999}
.match-item.selected{background:var(--ink);color:#fff;border-color:var(--ink)}
.match-item.matched-ok{background:var(--okl);color:var(--ok);border-color:var(--ok);cursor:default}
.match-item.matched-err{background:var(--errl);color:var(--err);border-color:var(--err)}

/* 5. Word search */
.wsearch-grid{display:inline-grid;gap:3px;margin:10px auto;font-family:monospace}
.ws-cell{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;background:var(--sand);border-radius:5px;cursor:pointer;transition:all .15s;user-select:none}
.ws-cell:hover{background:#ddd}
.ws-cell.selected{background:var(--ink);color:#fff}
.ws-cell.found{color:#fff;border-radius:5px}
.found-list{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}
.found-word{font-size:13px;font-weight:700;padding:4px 12px;border-radius:999px;background:var(--okl);color:var(--ok)}
.to-find{font-size:13px;font-weight:700;padding:4px 12px;border-radius:999px;background:var(--sand);color:var(--muted)}

/* 6. Crossword */
.cross-wrap{overflow-x:auto}
.cross-grid{display:inline-grid;gap:2px}
.cross-cell{width:34px;height:34px;border:none;background:var(--sand);border-radius:4px;text-align:center;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;color:var(--ink);outline:none;caret-color:var(--ink);transition:background .15s;position:relative;text-transform:uppercase}
.cross-cell:focus{background:#e0ddd7;outline:2px solid var(--ink)}
.cross-cell.black{background:#222;cursor:default}
.cross-cell.ok-cell{background:var(--okl);color:var(--ok)}
.cross-cell.num-label{font-size:9px;font-weight:700;color:var(--muted);position:absolute;top:2px;left:3px;pointer-events:none}

/* 7. Quiz */
.quiz-score-bar{background:var(--sand);border-radius:var(--radiusS);padding:10px 16px;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px;display:flex;gap:16px}
.quiz-score-bar span{font-weight:800;color:var(--ink)}
.prog{height:6px;background:var(--sand);border-radius:3px;margin-bottom:14px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.quiz-q{font-size:16px;font-weight:800;margin-bottom:14px;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
@media(max-width:420px){.opts{grid-template-columns:1fr}}
.opt{padding:12px 14px;font-size:14px;font-weight:700;background:var(--sand);border:2px solid var(--border);border-radius:var(--radiusS);cursor:pointer;text-align:left;font-family:'Nunito',sans-serif;color:var(--ink);transition:all .15s;line-height:1.3}
.opt:hover:not([disabled]){border-color:#999;transform:translateY(-1px)}
.opt.correct{background:var(--okl);border-color:var(--ok);color:var(--ok)}
.opt.wrong{background:var(--errl);border-color:var(--err);color:var(--err)}
.end-card{text-align:center;padding:2.5rem 1rem}
.end-num{font-size:52px;font-weight:800;margin-bottom:6px}
.end-msg{font-size:15px;color:var(--muted);margin-bottom:1.5rem}

/* 8. Flip cards */
.flip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:10px}
.flip-card{height:90px;cursor:pointer;perspective:700px}
.flip-inner{width:100%;height:100%;transition:transform .45s;transform-style:preserve-3d;position:relative}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-f,.flip-b{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radiusS);display:flex;align-items:center;justify-content:center;padding:8px;text-align:center;border:2px solid var(--border)}
.flip-f{background:var(--sand);font-size:14px;font-weight:700}
.flip-b{transform:rotateY(180deg);font-size:13px;font-weight:600}

/* DIALOGUE */
.dialogue-line{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.spkr{font-size:11px;font-weight:800;min-width:90px;padding:4px 8px;border-radius:4px;text-align:center;flex-shrink:0;margin-top:2px}
.spkr-a{background:var(--a1l);color:var(--a1b)}
.spkr-b{background:var(--a2l);color:var(--a2b)}
.speech{font-size:14px;line-height:1.6;color:var(--ink)}

/* PROGRESS BADGE */
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px;background:var(--sand);color:var(--muted)}
.badge.done{background:var(--okl);color:var(--ok)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="login-logo">🇲🇦</div>
    <h1>Mémo Darija</h1>
    <p class="sub">Choisissez votre niveau pour accéder à vos leçons et exercices</p>
    <button class="lvl-btn" onclick="login('A1')">
      <span class="lvl-dot" style="background:#2d7d46"></span>
      <div><div class="lvl-name">Niveau A1 — Débutant</div><div class="lvl-desc">Salutations · Présentations · Nombres · Expressions</div></div>
    </button>
    <button class="lvl-btn" onclick="login('A2')">
      <span class="lvl-dot" style="background:#c47c1a"></span>
      <div><div class="lvl-name">Niveau A2 — Intermédiaire</div><div class="lvl-desc">Le passé · Vocabulaire · L'heure · Au hanout</div></div>
    </button>
    <button class="lvl-btn" onclick="login('B1')">
      <span class="lvl-dot" style="background:#5046a0"></span>
      <div><div class="lvl-name">Niveau B1 — Avancé</div><div class="lvl-desc">Verbes irréguliers · Démonstratifs · Interrogatifs · Météo</div></div>
    </button>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="screen">
  <div class="topbar">
    <div class="topbar-title">Mémo Darija</div>
    <span class="level-pill" id="lvlPill"></span>
    <button class="back-btn" onclick="logout()">Changer</button>
  </div>
  <div class="tab-scroll" id="tabRow"></div>
  <div class="content" id="panelContainer"></div>
</div>

<script>
var CL=null, QS={};

var LEVELS={
  A1:{color:'#2d7d46',bg:'#e8f5ed',text:'#1a5c31',label:'A1 · Débutant',
    tabs:['Salutations','Présentations','Nombres','Expressions','Fiches A1',
          'Trous A1','Associer A1','Mots cachés A1','Quiz A1']},
  A2:{color:'#c47c1a',bg:'#fef3e2',text:'#8f5a10',label:'A2 · Intermédiaire',
    tabs:['Salutations','Passé régulier','Vocab temps','Au hanout',"L'heure",'Expressions',
          'Fiches A2','Trous A2','Ordre mots A2','Associer A2','Mots croisés A2','Quiz A2']},
  B1:{color:'#5046a0',bg:'#eeedfb',text:'#352f7a',label:'B1 · Avancé',
    tabs:['Passé régulier','Passé irrégulier','Démonstratifs','Kayn','Interrogatifs','Météo',
          'Fiches B1','Trous B1','Ordre mots B1','Associer B1','Mots cachés B1','Quiz B1']}
};

function login(lvl){
  CL=lvl;
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  var lv=LEVELS[lvl];
  var p=document.getElementById('lvlPill');
  p.textContent=lv.label; p.style.background=lv.bg; p.style.color=lv.text;
  p.style.border='2px solid '+lv.color+'44';
  buildTabs(lvl);
}
function logout(){
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  QS={};
}
function buildTabs(lvl){
  var tabs=LEVELS[lvl].tabs, tr=document.getElementById('tabRow'), pc=document.getElementById('panelContainer');
  tr.innerHTML=''; pc.innerHTML='';
  tabs.forEach(function(t,i){
    var b=document.createElement('button');
    b.className='tab'+(i===0?' active':'');
    b.textContent=t;
    b.style.setProperty('--tc',LEVELS[lvl].color);
    if(i===0){b.style.background=LEVELS[lvl].color;b.style.color='#fff';b.style.borderColor=LEVELS[lvl].color;}
    b.onclick=function(){
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');x.style.background='';x.style.color='';x.style.borderColor='';});
      b.classList.add('active');b.style.background=LEVELS[lvl].color;b.style.color='#fff';b.style.borderColor=LEVELS[lvl].color;
      document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('active')});
      var pan=document.getElementById('pan-'+i); pan.classList.add('active');
      var qw=pan.querySelector('[data-quiz]');
      if(qw&&!QS[qw.dataset.quiz])initQuiz(qw.dataset.quiz);
    };
    tr.appendChild(b);
    var p=document.createElement('div');
    p.className='panel'+(i===0?' active':''); p.id='pan-'+i;
    p.innerHTML=buildPanel(t,lvl);
    pc.appendChild(p);
  });
  var fp=document.querySelector('.panel.active');
  if(fp){var qw=fp.querySelector('[data-quiz]');if(qw&&!QS[qw.dataset.quiz])initQuiz(qw.dataset.quiz);}
  setTimeout(initDragAll,100);
  setTimeout(initMatchAll,100);
  setTimeout(initWordSearch,100);
  setTimeout(initCrossword,100);
}

/* ─── PANEL ROUTER ─── */
function buildPanel(name,lvl){
  var m={
    'Salutations':pSalutations,'Présentations':pPresentations,'Nombres':pNombres,
    'Expressions':pExpressions,'Passé régulier':pPasseReg,'Passé irrégulier':pPasseIrreg,
    'Vocab temps':pVocaTemps,"Au hanout":pHanout,"L'heure":pHeure,
    'Démonstratifs':pDemonstratifs,'Kayn':pKayn,'Interrogatifs':pInterrogatifs,'Météo':pMeteo,
    'Fiches A1':function(){return pFiches('A1')},'Fiches A2':function(){return pFiches('A2')},'Fiches B1':function(){return pFiches('B1')},
    'Trous A1':pTrousA1,'Trous A2':pTrousA2,'Trous B1':pTrousB1,
    'Associer A1':function(){return pAssocier('A1')},'Associer A2':function(){return pAssocier('A2')},'Associer B1':function(){return pAssocier('B1')},
    'Ordre mots A2':function(){return pOrdre('A2')},'Ordre mots B1':function(){return pOrdre('B1')},
    'Mots cachés A1':function(){return pWordSearch('A1')},'Mots cachés B1':function(){return pWordSearch('B1')},
    'Mots croisés A2':pCrossword,
    'Quiz A1':function(){return pQuiz('A1')},'Quiz A2':function(){return pQuiz('A2')},'Quiz B1':function(){return pQuiz('B1')}
  };
  return m[name]?m[name]():'<div class="card"><p style="color:var(--muted);font-size:14px">Contenu à venir.</p></div>';
}

/* ─── LESSON PANELS ─── */
function pSalutations(){return '<div class="card"><div class="card-title"><span class="icon">👋</span>Salutations de base</div><table><tr><th>Darija</th><th>Traduction</th><th>Contexte</th></tr><tr><td>Salam-o 3alaykom</td><td>Que la paix soit avec vous</td><td>Formelle</td></tr><tr><td>Wa 3alaykom Salam</td><td>Et sur vous la paix</td><td>Réponse</td></tr><tr><td>Sba7 el-khir</td><td>Bonjour (matin)</td><td>Matin</td></tr><tr><td>Msa el-khir</td><td>Bonsoir</td><td>Soir</td></tr><tr><td>Ki dayr ? / Ki dayra ?</td><td>Comment vas-tu ? (m/f)</td><td>Informel</td></tr><tr><td>Labass 3lik ? / Labass ?</td><td>Tu vas bien ?</td><td>Courant</td></tr><tr><td>Labass, 7amdolilLah</td><td>Ça va, Dieu merci</td><td>Réponse</td></tr><tr><td>W nta? / W nti?</td><td>Et toi ? (m/f)</td><td>Relance</td></tr><tr><td>Beslama</td><td>Au revoir</td><td>Départ</td></tr><tr><td>Chokrane</td><td>Merci</td><td>Remerciement</td></tr><tr><td>Baraka Allah-o fik</td><td>Que Dieu te bénisse</td><td>Remerciement fort</td></tr></table></div>'+
'<div class="card"><div class="card-title"><span class="icon">💬</span>Dialogue type</div>'+
'<div class="dialogue-line"><span class="spkr spkr-a">Camille</span><span class="speech">Sba7 el-khir ! Ki dayr ?</span></div>'+
'<div class="dialogue-line"><span class="spkr spkr-b">Ahmed</span><span class="speech">Labass, 7amdolilLah. W nti ?</span></div>'+
'<div class="dialogue-line"><span class="spkr spkr-a">Camille</span><span class="speech">Labass. Chokrane !</span></div>'+
'<div class="dialogue-line"><span class="spkr spkr-b">Ahmed</span><span class="speech">Beslama !</span></div>'+
'<div class="note">Les salutations au Maroc incluent souvent des questions sur la famille et la santé — c\'est un signe de respect et de chaleur humaine.</div></div>';}

function pPresentations(){return '<div class="card"><div class="card-title"><span class="icon">🙋</span>Se présenter</div><table><tr><th>Français</th><th>Darija</th></tr><tr><td>Comment tu t\'appelles ?</td><td>Achno smiytek ?</td></tr><tr><td>Je m\'appelle...</td><td>Smiyti...</td></tr><tr><td>Quel âge as-tu ?</td><td>Che7al f 3emrek ?</td></tr><tr><td>J\'ai ... ans.</td><td>3endi ... 3am.</td></tr><tr><td>D\'où viens-tu ?</td><td>Mnin nta / Mnin nti ?</td></tr><tr><td>Je viens de France</td><td>Ana men fransa</td></tr><tr><td>J\'étudie</td><td>Kan-qra</td></tr><tr><td>Je travaille</td><td>Kan-khdem</td></tr><tr><td>Je parle un peu darija</td><td>Kan-hder chwia d ddarja</td></tr><tr><td>Enchanté(e)</td><td>Mecherrfine</td></tr></table></div>';}

function pNombres(){
  var n1='',n2='';

function moveChip(chip,bankId,slotId){
  var bank=document.getElementById(bankId),slot=document.getElementById(slotId);
  if(!bank||!slot)return;
  if(chip.parentElement===bank){slot.appendChild(chip);chip.classList.add('placed');}
  else{bank.appendChild(chip);chip.classList.remove('placed','correct-chip','wrong-chip');}
}
function checkOrder(lvl,n){
  var correct=0;
  for(var i=0;i<n;i++){
    var slot=document.getElementById('slot-'+lvl+'-'+i);
    var bank=document.getElementById('bank-'+lvl+'-'+i);
    if(!slot||!bank)continue;
    var ans=Array.from(slot.querySelectorAll('.word-chip')).map(function(c){return c.dataset.word;}).join(' ');
    var ok=ans===bank.dataset.correct;
    if(ok)correct++;
    slot.querySelectorAll('.word-chip').forEach(function(c){c.classList.remove('correct-chip','wrong-chip');c.classList.add(ok?'correct-chip':'wrong-chip');});
  }
  var fb=document.getElementById('fbOrd'+lvl);
  if(fb)fb.innerHTML='<div class="fb '+(correct===n?'ok':'err')+'">Score : '+correct+'/'+n+(correct===n?' — Parfait !':' — Vérifiez les phrases en rouge.')+'</div>';}
function resetOrder(lvl,n){

var matchSel={};
function selectMatch(el,side,lvl){
  if(el.classList.contains('matched-ok'))return;
  var key=side+lvl;
  if(matchSel[key]){matchSel[key].classList.remove('selected');}
  if(matchSel[side==='L'?'R'+lvl:'L'+lvl]){
    var other=matchSel[side==='L'?'R'+lvl:'L'+lvl];
    var lEl=side==='L'?el:other,rEl=side==='R'?el:other;
    if(lEl.dataset.pair===rEl.dataset.val){
      lEl.classList.add('matched-ok');rEl.classList.add('matched-ok');
      lEl.classList.remove('selected');rEl.classList.remove('selected');
      delete matchSel['L'+lvl];delete matchSel['R'+lvl];
      var done=document.querySelectorAll('#matchL-'+lvl+' .matched-ok').length;
      var total=document.querySelectorAll('#matchL-'+lvl+' .match-item').length;
      var sc=document.getElementById('matchScore-'+lvl);
      if(sc){sc.textContent=done+'/'+total+' associé'+(done>1?'s':'')+(done===total?' — Bravo, tout est juste !':'');sc.style.color=done===total?'var(--ok)':'var(--muted)';}
    } else {
      el.classList.add('selected');
      setTimeout(function(){lEl.classList.remove('selected');rEl.classList.remove('selected');delete matchSel['L'+lvl];delete matchSel['R'+lvl];},600);
      return;
    }
  } else {
    matchSel[key]=el;el.classList.add('selected');
  }}

var wsState={};
function initWordSearch(){
  ['A1','B1'].forEach(function(lvl){
    var el=document.getElementById('wsGrid-'+lvl);
    if(!el||el.dataset.init)return;
    el.dataset.init='1';
    var words={A1:['SALAM','CHOKRAN','BESLAMA','IYYEH','BEZZAF','CHWIYA'],B1:['HADA','HADAK','KAYN','FINE','KIFACH','METEO']}[lvl];
    var SIZE=10,grid=[];
    for(var i=0;i<SIZE;i++){grid.push(new Array(SIZE).fill(''));}
    var placed=[];
    words.forEach(function(w){
      for(var attempt=0;attempt<200;attempt++){
        var dir=Math.floor(Math.random()*2),r,c;
        if(dir===0){r=Math.floor(Math.random()*SIZE);c=Math.floor(Math.random()*(SIZE-w.length));}
        else{r=Math.floor(Math.random()*(SIZE-w.length));c=Math.floor(Math.random()*SIZE);}
        var ok=true;
        for(var k=0;k<w.length;k++){var cr=dir===0?r:r+k,cc=dir===0?c+k:c;if(grid[cr][cc]&&grid[cr][cc]!==w[k]){ok=false;break;}}
        if(ok){for(var k=0;k<w.length;k++){var cr=dir===0?r:r+k,cc=dir===0?c+k:c;grid[cr][cc]=w[k];}placed.push({w,r,c,dir});break;}
      }
    });
    var alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    for(var i=0;i<SIZE;i++)for(var j=0;j<SIZE;j++)if(!grid[i][j])grid[i][j]=alpha[Math.floor(Math.random()*26)];
    el.style.display='grid';
    el.style.gridTemplateColumns='repeat('+SIZE+',32px)';
    el.style.gap='3px';
    wsState[lvl]={grid,placed,sel:[],found:[],words};
    for(var i=0;i<SIZE;i++)for(var j=0;j<SIZE;j++){
      (function(r,c){
        var cell=document.createElement('div');
        cell.className='ws-cell';cell.textContent=grid[r][c];
        cell.id='wsc-'+lvl+'-'+r+'-'+c;
        cell.onclick=function(){wsClick(lvl,r,c);};
        el.appendChild(cell);
      })(i,j);
    }
  });
}
function wsClick(lvl,r,c){
  var st=wsState[lvl];if(!st)return;
  var cell=document.getElementById('wsc-'+lvl+'-'+r+'-'+c);
  if(!cell||cell.classList.contains('found'))return;
  var idx=st.sel.findIndex(function(s){return s[0]===r&&s[1]===c;});
  if(idx>=0){st.sel.splice(idx,1);cell.classList.remove('selected');}
  else{st.sel.push([r,c]);cell.classList.add('selected');}
  checkWsWord(lvl);
}
function checkWsWord(lvl){
  var st=wsState[lvl];
  st.placed.forEach(function(p){
    if(st.found.includes(p.w))return;
    var cells=[];
    for(var k=0;k<p.w.length;k++){cells.push([p.dir===0?p.r:p.r+k,p.dir===0?p.c+k:p.c]);}
    var allSel=cells.every(function(cc){return st.sel.some(function(s){return s[0]===cc[0]&&s[1]===cc[1];});});
    var noneExtra=st.sel.length===cells.length;
    if(allSel&&noneExtra){
      st.found.push(p.w);
      cells.forEach(function(cc){
        var cell=document.getElementById('wsc-'+lvl+'-'+cc[0]+'-'+cc[1]);
        if(cell){cell.classList.remove('selected');cell.classList.add('found');cell.style.background=LEVELS[lvl].color;}
      });
      st.sel=[];
      var badge=document.getElementById('ww-'+lvl+'-'+p.w);
      if(badge){badge.className='found-word';}
      var done=document.getElementById('wsDone-'+lvl);
      if(done){done.textContent=st.found.length+'/'+st.words.length+' trouvé'+(st.found.length>1?'s':'')+(st.found.length===st.words.length?' — Bravo, tous les mots trouvés !':'');done.style.color=st.found.length===st.words.length?'var(--ok)':'var(--muted)';}
    }
  });
}

/* ─── PHONETIC NORMALIZATION FOR DARIJA ─── */
function phonetize(s){
  return s.trim().toLowerCase()
    /* espaces multiples */
    .replace(/\s+/g,' ')
    /* voyelles longues : ou/u → u, ai/ay/ei → i, ae → a */
    .replace(/ou/g,'u')
    .replace(/oû/g,'u')
    .replace(/aï|ay|aey|ei/g,'i')
    /* h aspiré muet en fin de mot ou entre voyelles */
    .replace(/([aeiuoy])h([aeiuoy])/g,'$1$2')
    /* doublons consonantiques non significatifs */
    .replace(/([bcdfghjklmnpqrstvwxz])\1+/g,'$1')
    /* variantes ch/ch / sh */
    .replace(/sh/g,'ch')
    /* variantes kh / x */
    .replace(/x/g,'kh')
    /* variantes gh / g en fin */
    /* 3 = ain, 7 = ha, 9 = qaf : on garde */
    /* -e final muet */
    .replace(/e$/g,'')
    /* tirets et apostrophes */
    .replace(/[-'`]/g,'')
    /* accents courants */
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}
function darijaMatch(val,ans){
  if(!val)return false;
  var pv=phonetize(val), pa=phonetize(ans);
  if(pv===pa)return true;
  /* distance de Levenshtein tolérante : 1 erreur pour ≤6 chars, 2 pour >6 */
  var maxD=pa.length<=6?1:2;
  return levenshtein(pv,pa)<=maxD;
}
function levenshtein(a,b){
  var m=a.length,n=b.length,dp=[];
  for(var i=0;i<=m;i++){dp[i]=[i];for(var j=1;j<=n;j++)dp[i][j]=0;}
  for(var j=0;j<=n;j++)dp[0][j]=j;
  for(var i=1;i<=m;i++)for(var j=1;j<=n;j++){
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  }
  return dp[m][n];
}

function checkBlanks(ids,fbId){
  var c=0;
  ids.forEach(function(id){
    var el=document.getElementById(id);if(!el)return;
    el.classList.remove('ok','err');
    var v=el.value.trim(), a=el.dataset.ans;
    if(v&&darijaMatch(v,a)){el.classList.add('ok');c++;}
    else if(v)el.classList.add('err');
  });
  var fb=document.getElementById(fbId);
  if(fb)fb.innerHTML='<div class="fb '+(c===ids.length?'ok':'err')+'">'+c+'/'+ids.length+(c===ids.length?' — Parfait !':' juste'+(c>1?'s':'')+'. Cases en rouge à corriger.')+'</div>';
}

  ids.forEach(function(id){var el=document.getElementById(id);if(el){el.value='';el.classList.remove('ok','err');}});
  var fb=document.getElementById(fbId);if(fb)fb.innerHTML='';
}

function pQuiz(lvl){return '<div data-quiz="'+lvl+'"><div id="qInner-'+lvl+'"></div></div>';}
function initQuiz(lvl){QS[lvl]={idx:0,score:0,answered:false};renderQ(lvl);}
function renderQ(lvl){
  var st=QS[lvl],data=QUIZ[lvl],wrap=document.getElementById('qInner-'+lvl);
  if(!wrap)return;
  var lv=LEVELS[lvl];
  if(st.idx>=data.length){
    var pct=Math.round(st.score/data.length*100);
    var msg=pct===100?'Score parfait !':pct>=70?'Très bien !':pct>=50?'Pas mal !':'À réviser...';
    wrap.innerHTML='<div class="card"><div class="end-card"><div class="end-num" style="color:'+lv.color+'">'+st.score+'/'+data.length+'</div><div class="end-msg">'+msg+'</div><button class="btn btn-primary" onclick="initQuiz(\''+lvl+'\')">Recommencer</button></div></div>';
    return;
  }
  var q=data[st.idx];
  var pct=Math.round(st.idx/data.length*100);
  var opts=q.o.map(function(o,i){return '<button class="opt" id="qo-'+lvl+'-'+i+'" onclick="selQ(\''+lvl+'\','+i+')">'+o+'</button>';}).join('');
  wrap.innerHTML='<div class="quiz-score-bar">Score <span>'+st.score+'</span>/'+data.length+' &nbsp; Question <span>'+(st.idx+1)+'</span>/'+data.length+'</div>'+
  '<div class="prog"><div class="prog-fill" style="width:'+pct+'%;background:'+lv.color+'"></div></div>'+
  '<div class="card"><div class="quiz-q">'+q.q+'</div><div class="opts">'+opts+'</div>'+
  '<div id="qfb-'+lvl+'"></div>'+
  '<div class="action-row"><button class="btn btn-primary" id="qnxt-'+lvl+'" style="display:none" onclick="nextQ(\''+lvl+'\')">Question suivante →</button></div></div>';
  st.answered=false;
}
function selQ(lvl,idx){
  var st=QS[lvl];if(st.answered)return;
  st.answered=true;
  var q=QUIZ[lvl][st.idx];
  if(q.a===idx)st.score++;
  for(var i=0;i<q.o.length;i++){var b=document.getElementById('qo-'+lvl+'-'+i);if(b){b.disabled=true;if(i===q.a)b.classList.add('correct');else if(i===idx)b.classList.add('wrong');}}
  var fb=document.getElementById('qfb-'+lvl);
  if(fb)fb.innerHTML='<div class="fb '+(q.a===idx?'ok':'err')+'">'+(q.a===idx?'Correct !':'Incorrect — bonne réponse : '+q.o[q.a])+'</div>';
  var nb=document.getElementById('qnxt-'+lvl);if(nb)nb.style.display='inline-flex';
  st.idx++;
}
function nextQ(lvl){renderQ(lvl);}
